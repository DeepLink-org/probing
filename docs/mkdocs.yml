site_name: Probing
site_description: Dynamic Performance Profiler for Distributed AI
site_url: https://github.com/DeepLink-org/probing
docs_dir: src

repo_name: DeepLink-org/probing
repo_url: https://github.com/DeepLink-org/probing

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          site_name: "Probing Documentation"
        - locale: zh
          name: 中文
          build: true
          site_name: "Probing 文档"
          nav_translations:
            Home: 首页
            Getting Started: 入门
            Installation: 安装指南
            Quick Start: 快速开始
            Core model: 核心模型
            User Guide: 用户指南
            SQL Analytics: SQL 分析
            Diagnostic Skills: 诊断 Skill
            Memory Analysis: 内存分析
            Live Debugging: 现场调试
            Troubleshooting: 常见问题
            Architecture: 架构
            Platform: 平台核心
            Collectors & Profiling: 采集与 Profiling
            Distributed: 分布式
            Modularity & Boundaries: 模块化与边界
            Data Layer: 数据层
            Extensibility: 扩展机制
            CLI Command Tree: CLI 命令树
            Profiling: 性能分析
            NCCL Profiler: NCCL Profiler
            Debugging Engine: 调试引擎
            Training Phases: 训练阶段
            Overview: 概览
            Torchrun Cluster Heartbeat: torchrun 集群心跳
            Federated Query Engine: 联邦查询引擎
            Hierarchical Fan-out: 分层集群查询
            Cluster with Pulsing: 基于 Pulsing 的集群
            System Architecture (legacy): 系统架构（旧版）
            Examples: 示例
            Training Debugging: 训练调试
            Memory Leak: 内存泄漏
            Performance Analysis: 性能分析
            Reference: 参考手册
            SQL Tables: SQL 表目录
            CLI & Python API: CLI 与 Python API
            Environment Variables: 环境变量
            Skill Format: Skill 格式规范
            Versions: 版本兼容性
            Contributing: 贡献指南
            Development Setup: 开发环境
            Welcome Contributors: 欢迎参与开发
            Welcome: 欢迎参与
            Submitting Changes: 提交变更
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            docstring_options:
              ignore_init_summary: yes
            merge_init_into_class: yes
            show_submodules: no

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
    - Core model: guide/concepts.md
  - User Guide:
    - guide/index.md
    - SQL Analytics: guide/sql-analytics.md
    - Diagnostic Skills: guide/skills.md
    - Memory Analysis: guide/memory-analysis.md
    - Live Debugging: guide/debugging.md
    - Troubleshooting: guide/troubleshooting.md
  - Architecture:
    - design/index.md
    - Platform:
      - Modularity & Boundaries: design/modularity.md
      - Data Layer: design/data-layer.md
      - Extensibility: design/extensibility.md
      - CLI Command Tree: design/cli.md
    - Collectors & Profiling:
      - Profiling: design/profiling.md
      - NCCL Profiler: design/nccl-profiler.md
      - Debugging Engine: design/debugging.md
      - Training Phases: design/training-phase.md
    - Distributed:
      - Overview: design/distributed.md
      - Torchrun Cluster Heartbeat: design/torchrun-cluster.md
      - Federated Query Engine: design/federation.md
      - Hierarchical Fan-out: design/hierarchical-fanout.md
      - Cluster with Pulsing: design/cluster-pulsing.md
    - System Architecture (legacy): design/architecture.md
  - Examples:
    - examples/index.md
    - Training Debugging: examples/training-debugging.md
    - Memory Leak: examples/memory-leak.md
    - Performance Analysis: examples/performance-analysis.md
  - Reference:
    - reference/index.md
    - SQL Tables: reference/sql-tables.md
    - CLI & Python API: api-reference.md
    - Environment Variables: reference/env-vars.md
    - Skill Format: reference/skill-format.md
    - Versions: versions.md
  - Contributing: contributing.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DeepLink-org/probing
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/probing/

extra_css:
  - assets/stylesheets/home.css

