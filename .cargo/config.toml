# Optional local speedup on Linux (do not commit — CI may not have mold):
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "linker=clang", "-C", "link-arg=-fuse-ld=mold"]

# Single artifact tree for the main workspace + web (see web/.cargo/config.toml).
[build]
target-dir = "target"
incremental = true

# dioxus' wasm-opt chokes on some DWARF; skip debuginfo for wasm dev builds.
[target.wasm32-unknown-unknown]
rustflags = ["-C", "debuginfo=0"]

