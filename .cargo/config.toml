[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "linker=clang", "-C", "link-arg=-fuse-ld=mold"]

# Nightly rustc can emit DWARF that dioxus' bundled binaryen (wasm-opt) cannot parse,
# causing SIGABRT during release web builds. Skip debuginfo for wasm so wasm-opt succeeds.
[target.wasm32-unknown-unknown]
rustflags = ["-C", "debuginfo=0"]

[unstable]
codegen-backend = true

[profile.dev]
codegen-backend = "cranelift"
