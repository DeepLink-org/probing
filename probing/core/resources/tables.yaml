# Agent overlay for table/column semantics (synonyms, notes, global_name, key_columns).
# SSOT for descriptions: in-code docs registry (collectors, @table, mmap Schema).
# Engine merge: registry first; this file fills gaps and supplies agent-only fields.
# Consumed at compile time by probing-core (probe.probing.table_docs / column_docs).
apiVersion: probing.dev/v1
kind: SemanticCatalog

tables:
  python.torch_trace:
    description: "PyTorch 模块级 forward/step hook 耗时与 GPU 显存快照（长驻采样，非 torch.profiler 窗口）"
    synonyms: [torch trace, module timing, 模块耗时, 训练步 profiling]
    key_columns:
      micro_step: "最细粒度步计数（micro-batch 序号）"
      local_step: "本 rank 训练步（micro_step // micro_batches）"
      global_step: "全局训练步（各 rank 对齐时与 local_step 相同）"
      micro_batches: "梯度累积因子"
      seq: "本 step 内 hook 序号"
      rank: "torch.distributed rank（-1 未知）"
      world_size: "world size（-1 未知）"
      role: "并行角色键，如 dp=2,pp=1,tp=0"
      module: "模块全限定名"
      stage: "pre forward | post forward | pre step | post step"
      time_offset: "相对本 step 时间锚点的秒偏移"
      duration: "hook 耗时（秒）；post 行有意义"
      allocated: "当前 GPU 已分配显存（MB）"
      allocated_delta: "相对上一 hook 的 allocated 变化（MB）"
      max_allocated: "峰值已分配显存（MB）"
      max_allocated_delta: "相对上一 hook 的 max_allocated 变化（MB）"
      cached: "当前 GPU reserved 显存（MB）"
      max_cached: "峰值 reserved 显存（MB）"
    notes:
      - "第一个完整 step 为 discovery-only，可能无数据行"
      - "默认仅 forward hook；backward hook 默认关闭"

  python.torch_step_timing:
    description: "TorchProbe 每步墙钟耗时（含 shadow 基线 step），用于估算 profiling 开销"
    synonyms: [torch overhead, shadow step, profiling overhead, 探针开销]
    key_columns:
      micro_step: "最细粒度步计数"
      local_step: "本 rank 训练步"
      global_step: "全局训练步"
      micro_batches: "梯度累积因子"
      rank: "torch.distributed rank"
      world_size: "world size"
      role: "并行角色键"
      step_duration_sec: "本 step 墙钟耗时（秒），post_step_hook 结束到结束；probed step 含 flush"
      is_shadow: "1=shadow 基线 step（TorchProbe hook 全跳过），0=正常 probed step"
      sampled: "1=本 step 命中 TorchProbe 采样，0=未采样或 shadow"
      shadow_normal: "记录时的 shadow 配置：每周期 probed step 数"
      shadow_baseline: "记录时的 shadow 配置：每周期 baseline step 数"
      sample_rate: "记录时的 TorchProbe step 级采样率"
      sample_mode: "记录时的采样模式（恒为 random）"
    notes:
      - "默认 shadow=4:1：每 4 个 probed step 后 1 个 shadow step"
      - "overhead ≈ median(probed) / median(shadow) - 1；与 python.torch_trace 独立"
    global_name: global.python.torch_step_timing
    federation_columns: [_host, _addr, _rank, _role]

  python.profile_capture:
    description: "按需 torch.profiler 采集锚点（step、rank、数据质量元数据）"
    synonyms: [profile capture, kineto window, profiler anchor, 采集锚点]
    key_columns:
      capture_id: "采集主键（JOIN profile_hotspot）"
      local_step: "本 rank 训练步"
      global_step: "全局训练步"
      rank: "torch.distributed rank（-1 未知）"
      world_size: "world size（-1 未知）"
      role: "并行角色键"
      trigger: "触发来源（manual / repl / http / skill）"
      steps_profiled: "profile 窗口步数"
      wall_us: "采集墙钟时间（微秒）；Q2 分母"
      started_at_us: "开始时间（epoch 微秒）"
      ended_at_us: "结束时间（epoch 微秒）"
      status: "running | completed | failed"
      truncated: "1=事件列表被截断"
      event_count: "聚合前原始事件数"
      error: "失败信息"
    global_name: global.python.profile_capture
    federation_columns: [_host, _addr, _rank, _role]
    notes:
      - "虚拟表：进程内 Session，不写 memtable"
      - "finalize 时由 KinetoSqlAdaptor 物化"

  python.profile_hotspot:
    description: "结论事实表：每个 capture 上 kernel/op 时间桶聚合（支撑 Q1/Q2/Q3–Q6）"
    synonyms: [profile hotspot, kernel bottleneck, gpu time buckets, 热点事实表]
    key_columns:
      capture_id: "关联 profile_capture"
      local_step: "训练步（无 capture_id 时按 step 查）"
      global_step: "全局步"
      rank: "产生本行的 rank"
      bucket_kind: "kernel | cpu_op | memcpy | cuda_runtime | collective | other"
      bucket_name: "kernel 或 op 名"
      self_us: "self 时间（微秒），主排序指标"
      wall_us: "wall/subtree 时间（微秒）"
      calls: "调用次数"
      pct_of_capture: "self_us / capture.wall_us"
      module_hint: "栈映射 module 提示（v2）"
    global_name: global.python.profile_hotspot
    federation_columns: [_host, _addr, _rank, _role]
    notes:
      - "联邦 Q3–Q6 使用 global.python.profile_hotspot"

  python.comm_collective:
    description: "torch.distributed API 层集合通信记录（Python 墙钟计时，粗粒度回退；精准 NCCL 数据在 nccl.* 表）"
    synonyms: [collective, communication, 通信, all_reduce, torch.distributed]
    key_columns:
      micro_step: "最细粒度步计数"
      local_step: "本 rank 训练步"
      global_step: "全局训练步"
      micro_batches: "梯度累积因子"
      rank: "torch.distributed rank"
      world_size: "world size"
      role: "并行角色键"
      op: "集合通信算子名"
      group_rank: "进程组内 rank"
      group_size: "进程组大小"
      participate_ranks: "参与 rank 列表（JSON 数组字符串）"
      tensor_shape: "张量 shape 字符串"
      tensor_dtype: "张量 dtype"
      bytes: "通信字节数"
      duration_ms: "Python API 调用墙钟耗时（毫秒）— launch 层计时，非 NCCL 执行时间"
      async_op: "1=异步 collective，0=同步"
    global_name: global.python.comm_collective
    federation_columns: [_host, _addr, _rank, _role]
    notes:
      - "来源：torch.distributed monkey-patch（Torch API 层），NCCL profiler 插件启用时默认关闭"
      - "查执行时间/带宽/等待分解请用 nccl.coll_perf / nccl.proxy_ops（NCCL 原生事件）"
      - "本表独有训练步上下文（global_step 等），可与 nccl.* 按时间窗对齐"

  python.torch_nccl_flight_record:
    description: "PyTorch Flight Recorder collective 环形缓冲快照（NCCL watchdog timeout / desync 诊断）"
    synonyms: [Flight Recorder, NCCL watchdog, collective desync, watchdog timeout, 反同步]
    key_columns:
      snapshot_id: "probing 触发 snapshot 的时间戳（纳秒）"
      rank: "torch.distributed rank"
      world_size: "world size"
      record_id: "PyTorch Flight Recorder 记录 id"
      pg_id: "ProcessGroup id"
      pg_name: "ProcessGroup 名称"
      pg_desc: "ProcessGroup 描述"
      collective_seq_id: "进程组内 collective 序号"
      p2p_seq_id: "P2P 序号"
      op_id: "PyTorch op id"
      profiling_name: "collective 名称，如 nccl:all_reduce"
      state: "collective 状态，如 scheduled/started/completed"
      input_sizes: "输入 tensor size JSON"
      input_dtypes: "输入 dtype JSON"
      output_sizes: "输出 tensor size JSON"
      output_dtypes: "输出 dtype JSON"
      time_created_ns: "记录创建时间"
      time_discovered_started_ns: "发现 started 的时间"
      time_discovered_completed_ns: "发现 completed 的时间"
      duration_ns: "collective duration（若 PyTorch 提供）"
      timeout_ms: "watchdog timeout 配置"
      retired: "1=已从活跃集合退休"
      is_p2p: "1=P2P op"
      frames: "调用栈 JSON"
      top_frame: "调用栈代表帧"
    global_name: global.python.torch_nccl_flight_record
    federation_columns: [_host, _addr, _rank, _role]
    notes:
      - "由 /apis/pythonext/flight-recorder/snapshot 触发写入"
      - "需要 PyTorch >= 2.5 的 torch._C._distributed_c10d._dump_nccl_trace"

  python.torch_nccl_pg_status:
    description: "PyTorch Flight Recorder ProcessGroup 状态快照"
    synonyms: [Flight Recorder PG, process group status, NCCL PG]
    key_columns:
      snapshot_id: "probing 触发 snapshot 的时间戳（纳秒）"
      rank: "torch.distributed rank"
      world_size: "world size"
      pg_id: "ProcessGroup id"
      pg_name: "ProcessGroup 名称"
      pg_desc: "ProcessGroup 描述"
      ranks: "ProcessGroup 成员 rank 字符串"
      last_enqueued_collective: "最后入队 collective seq"
      last_started_collective: "最后 started collective seq"
      last_completed_collective: "最后 completed collective seq"
    global_name: global.python.torch_nccl_pg_status
    federation_columns: [_host, _addr, _rank, _role]

  python.trace_event:
    description: "分布式 tracing：span 起止与自定义 event（python.tracing）"
    synonyms: [trace, span, timeline, 链路]
    key_columns:
      record_type: "span_start | span_end | event"
      trace_id: "同一 trace 内共享的 trace id"
      span_id: "span 唯一 id"
      parent_id: "父 span id（-1 表示无）"
      name: "span 或 event 名称"
      phase: "训练阶段：forward | backward | optimizer（可为空）"
      time: "时间戳（纳秒，epoch）"
      thread_id: "记录线程 id"
      location: "源码位置（file:line）"
      attributes: "JSON 元数据（rank、local_step 等）"
      event_attributes: "event 专用 JSON 属性"
    notes:
      - "与 span_end 按 span_id join 可算 duration"
      - "物化视图见 python.tracing.table.SPANS_SQL"

  python.backtrace:
    description: "混合 Python + native 调用栈快照（即时采集，非历史表）"
    synonyms: [stack, backtrace, 调用栈, hang stack]
    key_columns:
      ip: "native 帧指令指针（Python 帧为 NULL）"
      file: "源文件路径"
      func: "函数/符号名"
      lineno: "行号"
      depth: "栈深度（0=最内层）"
      frame_type: "Python | Native | Rust"
    notes:
      - "通过 probing backtrace 或 inject 后 SELECT 填充"

  python.variables:
    description: "TorchProbe 变量追踪快照（需启用 vars/watch）"
    synonyms: [variable trace, watch, 变量快照]
    key_columns:
      micro_step: "训练 micro-step"
      func: "函数名"
      name: "变量名"
      value: "变量值的字符串表示"
    notes:
      - "与 python.trace_variables 不同；后者记录调试器 watch 变更"

  python.trace_variables:
    description: "调试器 watch 触发的变量变更记录"
    synonyms: [trace variables, watch changes, 变量变更]
    key_columns:
      function_name: "发生变更的函数名"
      filename: "源文件"
      lineno: "行号"
      variable_name: "变量名"
      value: "变更后的值（字符串）"
      value_type: "值类型名"

  cpu.utilization:
    description: "主机 CPU / RSS 周期采样（进程级 + Top-N 线程）"
    synonyms: [cpu, host memory, RSS, 主机 CPU]
    key_columns:
      ts: "采样时间戳（微秒 since epoch）"
      scope: "process | thread"
      platform: "采样后端（linux | macos）"
      tid: "线程 id（process scope 时为 0）"
      comm: "进程/线程名"
      wall_ns: "距上次采样的墙钟间隔（纳秒）"
      delta_user_ns: "用户态 CPU 增量（纳秒）"
      delta_sys_ns: "内核态 CPU 增量（纳秒）"
      delta_total_ns: "总 CPU 增量（纳秒）"
      cpu_user_pct: "用户态 CPU 利用率（%）"
      cpu_sys_pct: "内核态 CPU 利用率（%）"
      cpu_total_pct: "总 CPU 利用率（%）"
      cum_user_ns: "累计用户态 CPU 时间（纳秒）"
      cum_sys_ns: "累计内核态 CPU 时间（纳秒）"
      rss_kb: "常驻内存 RSS（KB）；仅 process scope"
      thread_count: "线程数；仅 process scope"
      delta_vol_ctxt: "自愿上下文切换增量"
      delta_invol_ctxt: "非自愿上下文切换增量"
      state: "线程/进程状态（Linux）"
      wchan: "内核 wait channel（Linux）"

  cpu.tasks:
    description: "CPU Top-N 热点线程明细（与 cpu.utilization 同周期采样）"
    synonyms: [cpu threads, top threads, 热点线程]
    key_columns:
      ts: "采样时间戳（微秒）"
      platform: "linux | macos"
      tid: "线程 id"
      comm: "线程名"
      state: "线程状态"
      wchan: "内核 wait channel"
      wall_ns: "采样间隔（纳秒）"
      delta_user_ns: "用户态 CPU 增量（纳秒）"
      delta_sys_ns: "内核态 CPU 增量（纳秒）"
      delta_total_ns: "总 CPU 增量（纳秒）"

  gpu.utilization:
    description: "GPU 显存与利用率周期采样"
    synonyms: [gpu memory, VRAM, 显存, GPU利用率]
    key_columns:
      ts: "采样时间戳（微秒）"
      backend: "cuda | mps | …"
      device_id: "设备序号"
      name: "设备名称"
      memory_model: "显存型号描述"
      chip: "芯片/架构标识"
      free_bytes: "空闲显存（字节）"
      total_bytes: "总显存（字节）"
      used_bytes: "已用显存（字节）"
      mem_used_pct: "显存使用率（%）"
      gpu_util_pct: "GPU 计算利用率（%；不可用为 -1）"
      mem_controller_util_pct: "显存控制器利用率（NVIDIA）"
      renderer_util_pct: "渲染引擎利用率（Apple MPS）"
      tiler_util_pct: "Tiler 利用率（Apple MPS）"
      driver_mem_bytes: "驱动保留显存（字节）"
      wall_ns: "采样间隔（纳秒）"

  process.kmsg:
    description: "Linux 内核 ring buffer（dmesg）— OOM、GPU Xid、IB 错误等"
    synonyms: [kernel log, dmesg, OOM, 内核日志]
    platform: linux
    key_columns:
      timestamp: "内核日志时间（微秒）"
      facility: "syslog facility"
      level: "日志级别"
      message: "内核消息正文"

  cluster.nodes:
    description: "已注册的分布式训练 peer（torchrun / PUT /apis/nodes）"
    synonyms: [cluster, nodes, ranks, 集群节点]
    key_columns:
      host: "主机名"
      addr: "probing HTTP 地址"
      local_rank: "节点内 local rank"
      rank: "全局 rank"
      world_size: "world size"
      group_rank: "进程组 rank"
      group_world_size: "进程组大小"
      role_name: "Torchrun / Elastic role 名"
      role_rank: "role 内 rank"
      role_world_size: "role 内 world size"
      role: "并行角色键（federation _role 来源）"
      status: "节点状态"
      timestamp: "最后更新时间（微秒）"

  rdma.mlx_hca:
    description: "InfiniBand/RoCE HCA 端口计数器快照（/sys/class/infiniband）"
    synonyms: [IB, RoCE, HCA, mlx, RDMA counters]
    platform: linux
    key_columns:
      hca_name: "HCA 设备名（如 mlx5_0）"
      port_rcv_packets: "端口接收包计数"
      port_rcv_data: "端口接收字节计数"
      port_xmit_packets: "端口发送包计数"
      port_xmit_data: "端口发送字节计数"
      link_downed: "链路 down 次数"
      np_cnp_sent: "RoCE CNP 发送计数"
      np_ecn_marked_roce_packets: "ECN 标记 RoCE 包计数"
      rcv_pkts_rate: "接收包速率（包/秒，两次采样差分）"
      snd_pkts_rate: "发送包速率（包/秒）"
    notes:
      - "需配置 rdma.hca.name 与 rdma.sample.rate"

  nccl.proxy_ops:
    description: "NCCL profiler plugin proxy-op wait 分解（culprit / victim 归因）"
    synonyms: [NCCL proxy, send_gpu_wait, recv_wait, culprit, victim, proxy wait]
    key_columns:
      ts: "事件时间戳（UNIX epoch 纳秒）"
      rank: "torch.distributed rank"
      tp_rank: "张量并行 rank（未知 -1）"
      pp_rank: "流水线并行 rank（未知 -1）"
      dp_rank: "数据并行 rank（未知 -1）"
      comm_hash: "NCCL communicator hash"
      coll_func: "集合通信名（AllReduce、AllGather…）"
      seq: "collective 序号"
      channel_id: "NCCL channel id"
      peer: "对端 rank"
      is_send: "1=send proxy，0=recv proxy"
      n_steps: "聚合的 ProxyStep 数"
      trans_bytes: "传输字节数（v4 按 step 累计）"
      send_gpu_wait_ns: "Culprit 信号 — 本地 GPU 未就绪发送"
      send_peer_wait_ns: "等待接收端 clear-to-send credits（仅 v4 ABI；v3 为 0）— 对端拥塞信号"
      send_wait_ns: "发送侧网络等待"
      recv_wait_ns: "Victim 信号 — 等待对端数据"
      recv_flush_wait_ns: "接收 flush 等待"
    global_name: global.nccl.proxy_ops
    federation_columns: [_host, _addr, _rank, _role]
    notes:
      - "需 NCCL_PROFILER_PLUGIN；插件同时导出 v4（NCCL ≥ 2.27）与 v3（NCCL 2.26）ABI，NCCL 自动选最高版本"
      - "mask Coll|P2P|ProxyOp|ProxyStep|KernelCh，默认 94"
      - "macOS 开发：PROBING_NCCL_MOCK=1 可注入合成数据"

  nccl.coll_perf:
    description: "NCCL collective / P2P 级性能（timing_source 标注计时来源；消息大小、算法、带宽）"
    synonyms: [collective perf, algobw, busbw, NCCL bandwidth, 集合通信带宽, message size]
    key_columns:
      ts: "op 完成时间戳（UNIX epoch 纳秒）"
      rank: "torch.distributed rank"
      tp_rank: "张量并行 rank（未知 -1）"
      pp_rank: "流水线并行 rank（未知 -1）"
      dp_rank: "数据并行 rank（未知 -1）"
      comm_hash: "NCCL communicator hash"
      n_ranks: "通信组大小（v4 init 提供；v3 为 -1）— busbw 换算用"
      coll_func: "操作名（AllReduce、AllGather、Send、Recv…）"
      seq: "collective 序号（P2P 为 0）"
      is_p2p: "1=P2P（Send/Recv），0=collective"
      peer: "P2P 对端 rank（collective 为 -1）"
      count: "元素个数"
      msg_size_bytes: "消息大小 = count × dtype 字节数"
      dtype: "NCCL 数据类型名"
      algo: "NCCL 算法（Ring、Tree…；P2P 为空）"
      proto: "NCCL 协议（LL、LL128、Simple…）"
      n_channels: "最大 channel 数（v4 起 P2P 也有值）"
      exec_time_ns: "实际执行耗时（纳秒）；由 timing_source 对应事件窗口重建"
      enqueue_time_ns: "host 侧 enqueue 耗时（纳秒；NCCL coll stopEvent 语义）"
      timing_source: "exec_time 来源：kernel_gpu（GPU globaltimer，v4）> kernel_ch（host 观测）> proxy > enqueue（回退）"
      algobw_gbps: "算法带宽 msg_size/exec_time（GB/s）；busbw 需乘集合通信系数"
    global_name: global.nccl.coll_perf
    federation_columns: [_host, _addr, _rank, _role]
    notes:
      - "NCCL coll stopEvent 只代表 enqueue 完成；exec_time_ns 由子事件（KernelCh/ProxyOp）引用计数重建"
      - "v4 ABI 下 timing_source=kernel_gpu，来自 GPU globaltimer（设备时钟，最精确）"
      - "busbw 换算：AllReduce 乘 2(n-1)/n，n 取 n_ranks（v3 行 n_ranks=-1 时需从外部推断）"
      - "PROBING_NCCL_MIN_MSG_BYTES 可过滤小消息"

  nccl.inflight_ops:
    description: "在途（已 start 未 stop）NCCL 操作周期快照 — hang 诊断信号"
    synonyms: [inflight, hang, stuck collective, 挂死, 卡住, watchdog]
    key_columns:
      ts: "快照时间戳（UNIX epoch 纳秒）"
      rank: "torch.distributed rank"
      comm_hash: "NCCL communicator hash"
      coll_func: "操作名（未知为 unknown）"
      seq: "collective 序号"
      kind: "coll / p2p / proxy_op"
      channel_id: "NCCL channel（proxy_op 有效）"
      peer: "对端 rank（未知 -1）"
      is_send: "1=send，0=recv（proxy_op 有效）"
      start_ns: "op 开始时间戳（epoch 纳秒）"
