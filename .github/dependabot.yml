version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-workspace:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /web
    schedule:
      interval: weekly
    groups:
      web-ui:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-dev:
        patterns:
          - "*"
