name: Run Tests

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  build-linux:
    name: Build wheel and Python tests (Linux 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.12"
          install-cargo-tools: "true"
          uv-sync-groups: "build,dev,wheel-test"
          cache-venv: "true"

      - name: Code style checking
        working-directory: ${{ github.workspace }}
        run: |
          make fmt-check
          make lint-rust

      - name: Docs lint
        working-directory: ${{ github.workspace }}
        run: |
          make docs-install
          make lint-docs

      - name: Build frontend and wheel
        run: |
          make frontend
          make wheel-ci

      - name: Install wheel, validate skills, and run Python tests
        run: |
          make install-wheel
          make validate-skills
          make coverage-python-wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: probing-wheel
          path: dist/probing-*.whl
          retention-days: 7

      - name: Upload Python coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 30

  test:
    name: Python tests (multi-version)
    needs: build-linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.12", "3.11", "3.10"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python test environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: ${{ matrix.python-version }}
          install-cargo-tools: "false"
          uv-sync-groups: "wheel-test"
          enable-rust: "false"
          enable-zig: "false"
          cache-venv: "true"
          cache-wheel-test-deps: "true"

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: probing-wheel
          path: dist

      - name: Install wheel and run tests
        working-directory: ${{ github.workspace }}
        run: make test-python-wheel

  web-test:
    name: Web UI tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.12"
          install-cargo-tools: "false"
          enable-zig: "false"
          enable-uv: "false"
          cache-venv: "false"

      - name: Run web crate tests and clippy
        working-directory: web
        run: |
          cargo test --all-targets
          cargo clippy --all-targets -- -D warnings

  rust-test:
    name: Rust tests (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.12"
          install-cargo-tools: "true"
          enable-zig: "false"
          cache-venv: "false"

      - name: Install llvm-tools-preview component
        run: rustup component add llvm-tools-preview --toolchain stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run Rust tests and collect coverage
        shell: bash
        run: |
          cargo llvm-cov clean --workspace
          # Do not source show-env here — llvm-cov nextest sets instrumentation itself.
          # extension-module is for the Python wheel only; omit it in lib tests (PyO3 linking).
          # Cdylib-only plugin wrappers share sources with rlib crates; exclude from coverage.
          cargo llvm-cov nextest --workspace --no-default-features \
            --exclude probing-hccl-profapi --exclude probing-nccl-profiler-cdylib
          cargo llvm-cov nextest -p probing-server --no-default-features --features kmsg,gpu,gpu-cuda
          cargo llvm-cov report --lcov --output-path coverage.lcov

      - name: Upload Rust coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage.lcov
          retention-days: 30

  rust-test-aarch64:
    name: Rust tests (Linux aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.12"
          install-cargo-tools: "true"
          enable-zig: "false"
          enable-uv: "false"
          cache-venv: "false"

      - name: Run Rust tests
        run: |
          cargo nextest run --workspace --no-default-features
          cargo nextest run -p probing-server --no-default-features --features kmsg,gpu,gpu-cuda

  windows-test:
    name: Windows (Rust + wheel)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          cache-workspaces: |
            .
            web

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run Rust tests
        shell: bash
        run: |
          cargo nextest run --workspace --no-default-features --nff
          cargo nextest run -p probing-server --no-default-features --features kmsg,gpu

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dioxus CLI (dx)
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli@0.7.9

      - name: Prepare wheel bundle
        shell: bash
        run: |
          rm -rf python/probing/bundled_web
          cd web && dx bundle --release
          test -f python/probing/bundled_web/public/index.html
          mkdir -p python/probing/bundled_web/public/assets
          cp -f web/assets/logo.svg python/probing/bundled_web/public/logo.svg 2>/dev/null || true
          cp -f web/assets/logo.svg python/probing/bundled_web/public/assets/logo.svg 2>/dev/null || true
          cp -f web/assets/tailwind.css python/probing/bundled_web/public/assets/tailwind.css
          test -f python/probing/bundled_skills/catalog.yaml

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --find-interpreter --features extension-module,gpu,gpu-cuda,kmsg
          sccache: "true"
          rust-toolchain: stable

      - name: Smoke-install wheel
        shell: bash
        run: |
          WH=$(ls -1 dist/probing-*.whl | head -1)
          python -m pip install -q --force-reinstall "$WH"
          PROBING=0 python -c "import probing; from probing import _core; print('probing', probing.VERSION)"

  macos-test:
    name: macOS tests (Rust + Python)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.12", "3.10"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: ${{ matrix.python-version }}
          install-cargo-tools: "true"
          uv-sync-groups: "build,wheel-test"
          cache-venv: "true"
          cache-wheel-test-deps: "true"

      - name: Run Rust tests
        if: matrix.python-version == '3.12'
        run: |
          cargo nextest run --workspace --no-default-features
          cargo nextest run -p probing-server --no-default-features --features kmsg,gpu

      - name: Build frontend and wheel, install, and run Python tests
        run: |
          make frontend
          make wheel-ci
          make install-wheel
          make validate-skills
          make test-python-wheel

  codecov:
    name: Upload coverage to Codecov
    needs: [build-linux, rust-test]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Download Rust coverage report
        uses: actions/download-artifact@v4
        with:
          name: rust-coverage
          path: .

      - name: Download Python coverage report
        uses: actions/download-artifact@v4
        with:
          name: python-coverage
          path: .

      - name: Check coverage files exist
        run: |
          test -f coverage.lcov
          test -f coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov,coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
