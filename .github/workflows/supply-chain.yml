name: Supply Chain

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    # Monday 02:00 UTC — refresh advisory DB and catch new RustSec entries
    - cron: "0 2 * * 1"

permissions:
  contents: read

jobs:
  rust-deny:
    name: Rust (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          cache-workspaces: |
            .
            web

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.20.2

      - name: Check main workspace
        run: cargo deny check

      - name: Check web crate
        run: cd web && cargo deny --config ../deny.toml check

  python-audit:
    name: Python (uv lock + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify uv.lock is present and current
        working-directory: ${{ github.workspace }}
        run: |
          test -f uv.lock || { echo "::error::uv.lock is missing. Run 'uv lock' and commit uv.lock."; exit 1; }
          uv lock --check

      - name: Export locked deps for audit
        run: |
          uv export --frozen --no-emit-package probing --group wheel-test \
            --format requirements.txt --no-hashes -o /tmp/requirements-audit.txt

      - name: Audit Python dependencies
        run: |
          python -m pip install -q pip-audit
          pip-audit -r /tmp/requirements-audit.txt
