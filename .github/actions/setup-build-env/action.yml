name: 'Setup Build Environment'
description: 'Setup Python, Rust, and build tools with caching'
inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  install-cargo-tools:
    description: 'Whether to install cargo tools'
    required: false
    default: 'true'
  install-python-deps:
    description: 'Whether to install Python build dependencies'
    required: false
    default: 'false'
  enable-rust-cache:
    description: 'Enable Swatinem/rust-cache for Cargo registry + target/'
    required: false
    default: 'true'
  dx-version:
    description: 'dioxus-cli (dx) version — keep in sync with web/Cargo.toml'
    required: false
    default: '0.7.9'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          pyproject.toml
          Makefile

    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: rustfmt, clippy
        rustflags: ""

    - name: Add Rust Targets
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Linux" ]; then
          rustup target add wasm32-unknown-unknown x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu
        elif [ "${{ runner.os }}" == "macOS" ]; then
          rustup target add wasm32-unknown-unknown x86_64-apple-darwin aarch64-apple-darwin
        fi

    - name: Cache Rust build artifacts
      if: inputs.enable-rust-cache == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          .
          web
        shared-key: probing
        cache-all-crates: "true"
        cache-on-failure: true
        cache-bin: true

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Install Zig toolchain
      uses: mlugg/setup-zig@v2

    # Prebuilt dx from GitHub Releases (no API rate limits). Official alternative:
    # DioxusLabs/dioxus-ci/actions/install-dioxus-cli (uses cargo-binstall internally).
    - name: Install dioxus CLI (dx)
      if: inputs.install-cargo-tools == 'true'
      uses: taiki-e/install-action@v2
      with:
        tool: dioxus-cli@${{ inputs.dx-version }}

    - name: Install other cargo tools
      if: inputs.install-cargo-tools == 'true'
      shell: bash
      run: |
        test -e ~/.cargo/bin/cargo-zigbuild || cargo install cargo-zigbuild
        test -e ~/.cargo/bin/rnr || cargo install rnr
        test -e ~/.cargo/bin/cargo-nextest || cargo install --locked cargo-nextest

    - name: Install Python Build Dependencies
      if: inputs.install-python-deps == 'true'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install build wheel toml maturin
