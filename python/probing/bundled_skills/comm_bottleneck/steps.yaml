apiVersion: probing.dev/v1
kind: Skill

metadata:
  id: comm_bottleneck
  title: "通信瓶颈分析"
  title_en: "Communication bottleneck"
  category: distributed
  tags: [NCCL, collective, communication, 通信, all_reduce]
  triggers:
    keywords:
      zh: ["通信慢", "NCCL", "all_reduce", "通信瓶颈", "带宽"]
      en: ["communication slow", "NCCL", "collective", "comm bottleneck"]
  docs: |
    按 collective op 聚合延迟与传输量，定位通信热点。
    适用于「计算不慢但 step 时间长」或「通信占比高」的场景。

    数据分两层，勿混淆计时语义：
    - nccl.coll_perf / nccl.proxy_ops（NCCL profiler 插件）：NCCL 原生事件，
      执行时间与带宽精准，优先采信；
    - python.comm_collective（Torch API 层插桩）：Python 墙钟，仅 launch 层
      粗粒度，插件不可用时的回退，胜在带训练步（global_step）上下文。

spec:
  parameters:
    - name: step_window
      type: integer
      default: 50
    - name: use_global
      type: boolean
      default: true

  requires:
    any_tables:
      - nccl.coll_perf
      - nccl.proxy_ops
      - python.comm_collective

  steps:
    - id: nccl_coll_bw
      title: "NCCL 精准带宽 (coll_perf, 按 op/消息大小)"
      type: sql
      sql: |
        SELECT
          coll_func,
          msg_size_bytes,
          timing_source,
          count(*) AS ops,
          avg(algobw_gbps) AS avg_gbps,
          min(algobw_gbps) AS min_gbps,
          avg(exec_time_ns) / 1e6 AS avg_exec_ms
        FROM {nccl_coll_table}
        GROUP BY coll_func, msg_size_bytes, timing_source
        ORDER BY avg_gbps ASC
        LIMIT 15
      on_empty: skip
      empty_message: "无 nccl.coll_perf — 需 NCCL profiler 插件；以下退回 Torch API 层粗粒度数据"

    - id: op_summary
      title: "各 collective op 统计 (Torch API 层, 粗粒度)"
      type: sql
      sql: |
        SELECT
          op,
          count(*) AS calls,
          avg(duration_ms) AS avg_ms,
          max(duration_ms) AS p100_ms,
          sum(bytes) AS total_bytes,
          avg(bytes) AS avg_bytes
        FROM {table_comm}
        WHERE global_step >= (
          SELECT max(global_step) - {step_window}
          FROM {table_comm}
        )
        GROUP BY op
        ORDER BY sum(duration_ms) DESC
      on_empty: skip
      empty_message: "无 comm_collective 数据（NCCL 插件启用时 Torch 侧插桩默认关闭，属预期）"

    - id: op_by_step
      title: "每 step 通信总耗时 (Torch API 层)"
      type: sql
      sql: |
        SELECT
          global_step,
          sum(duration_ms) AS comm_ms,
          count(*) AS calls,
          sum(bytes) AS bytes
        FROM {table_comm}
        WHERE global_step >= (
          SELECT max(global_step) - {step_window}
          FROM {table_comm}
        )
        GROUP BY global_step
        ORDER BY global_step
      on_empty: skip

    - id: slowest_calls
      title: "最慢的 collective 调用 (Torch API 层)"
      type: sql
      sql: |
        SELECT global_step, rank, op, duration_ms, bytes, tensor_shape
        FROM {table_comm}
        WHERE global_step >= (
          SELECT max(global_step) - {step_window}
          FROM {table_comm}
        )
        ORDER BY duration_ms DESC
        LIMIT 20
      on_empty: skip

    - id: nccl_proxy_wait
      title: "NCCL proxy wait 汇总 (profiler)"
      type: sql
      sql: |
        SELECT
          coll_func,
          sum(send_gpu_wait_ns) AS total_gpu_wait_ns,
          sum(recv_wait_ns) AS total_recv_wait_ns,
          count(*) AS ops
        FROM {nccl_proxy_table}
        WHERE seq >= (
          SELECT max(seq) - {step_window}
          FROM {nccl_proxy_table}
        )
        GROUP BY coll_func
        ORDER BY total_recv_wait_ns DESC
      on_empty: skip
      empty_message: "无 nccl.proxy_ops — 仅 Torch API 层粗粒度数据可用"

    - id: rdma_hint
      title: "RDMA 端口速率 (Linux)"
      type: sql
      platform: linux
      sql: |
        SELECT hca_name, rcv_pkts_rate, snd_pkts_rate, np_ecn_marked_roce_packets
        FROM rdma.mlx_hca
        LIMIT 5
      on_empty: skip
      empty_message: "RDMA 表不可用 — 非 InfiniBand/RoCE 或未配置 rdma.hca_name"

  variables:
    table_comm: "{comm_table}"
    nccl_proxy_table: "{nccl_proxy_table}"
    nccl_coll_table: "{nccl_coll_table}"

  interpretation:
    rules:
      - id: comm_dominates_step
        when: "step:op_by_step | column:comm_ms | avg > 100"
        severity: info
        message: "平均每 step 通信耗时 >100ms — 考虑梯度桶/重叠/压缩"

      - id: ecn_marked
        when: "step:rdma_hint | column:np_ecn_marked_roce_packets | max > 0"
        severity: warning
        message: "RoCE ECN 标记包 >0 — 网络可能存在拥塞"

  summary_template: |
    ## 通信瓶颈
    - **nccl_coll_bw**: NCCL 精准带宽（有则优先采信；注意 timing_source 列）
    - **op_summary**: Torch API 层各 op 总耗时（粗粒度回退）
    - **slowest_calls**: 极端慢调用
    - rank 不均衡 → skill: slow_rank

  next_steps:
    - "all_reduce 慢 → 检查 bucket 大小、overlap、FP16 compress"
    - "某消息桶带宽异常低 → 对照 timing_source（enqueue 回退行不代表执行带宽）"
    - "某 step comm_ms 尖峰 → 对照 checkpoint / eval 边界"
    - "RoCE 拥塞 → 查 rdma.mlx_hca 与交换机 ECN 配置"
    - "有 proxy wait 数据 → skill: nccl_culprit_victim"
