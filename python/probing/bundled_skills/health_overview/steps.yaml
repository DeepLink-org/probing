apiVersion: probing.dev/v1
kind: Skill

metadata:
  id: health_overview
  title: "训练健康概览"
  title_en: "Training health overview"
  category: triage
  tags: [overview, doctor, triage, 健康检查]
  triggers:
    keywords:
      zh: ["健康", "概览", "怎么样", "正常吗", "doctor", "体检"]
      en: ["health", "overview", "status", "doctor", "checkup"]
  docs: |
    快速扫描目标进程：有哪些表、CPU/GPU 最近采样、训练是否在推进。
    适合作为 agent 的默认第一步，或用户不确定从哪查起时使用。

spec:
  parameters:
    - name: sample_limit
      type: integer
      default: 5
      description: "Recent CPU/GPU samples to show"

  steps:
    - id: available_tables
      title: "可查询的数据表"
      type: sql
      sql: |
        SELECT table_schema, table_name, table_type
        FROM information_schema.tables
        WHERE table_schema NOT IN ('information_schema')
        ORDER BY table_schema, table_name
      on_empty: warn
      empty_message: "未发现业务表 — 确认 probing 已注入且 PROBING=1"

    - id: host_cpu
      title: "主机 CPU / 内存 (最近采样)"
      type: sql
      sql: |
        SELECT ts, comm, rss_kb, cpu_total_pct, thread_count, state
        FROM cpu.utilization
        WHERE scope = 'process'
        ORDER BY ts DESC
        LIMIT {sample_limit}
      on_empty: skip
      empty_message: "cpu.utilization 无数据 — CPU 采样可能未开启"

    - id: gpu_mem
      title: "GPU 显存 / 利用率 (最近采样)"
      type: sql
      sql: |
        SELECT ts, name, used_bytes, total_bytes, mem_used_pct, gpu_util_pct
        FROM gpu.utilization
        ORDER BY ts DESC
        LIMIT {sample_limit}
      on_empty: skip
      empty_message: "gpu.utilization 无数据 — GPU 扩展未启用或无 GPU"

    - id: latest_torch_step
      title: "最近训练 step (torch_trace)"
      type: sql
      sql: |
        SELECT max(local_step) AS latest_step, count(*) AS trace_rows
        FROM python.torch_trace
      on_empty: skip
      empty_message: "python.torch_trace 无数据 — 设置 probing.torch.profiling=on"

    - id: torch_probe_overhead
      title: "TorchProbe 运行时开销 (shadow step)"
      type: sql
      sql: |
        WITH bounds AS (
          SELECT GREATEST(COALESCE(MAX(CAST(local_step AS BIGINT)), 0) - 80, 1) AS win_start
          FROM python.torch_step_timing
        )
        SELECT
          round((median(CASE WHEN CAST(is_shadow AS BIGINT) = 0 AND CAST(sampled AS BIGINT) = 0 THEN CAST(step_duration_sec AS DOUBLE) END)
                / nullif(median(CASE WHEN CAST(is_shadow AS BIGINT) = 1 THEN CAST(step_duration_sec AS DOUBLE) END), 0) - 1) * 100, 2)
            AS dispatch_overhead_pct,
          round((median(CASE WHEN CAST(is_shadow AS BIGINT) = 0 THEN CAST(step_duration_sec AS DOUBLE) END)
                / nullif(median(CASE WHEN CAST(is_shadow AS BIGINT) = 1 THEN CAST(step_duration_sec AS DOUBLE) END), 0) - 1) * 100, 2)
            AS hook_tax_pct,
          round((median(CASE WHEN CAST(is_shadow AS BIGINT) = 0 AND CAST(sampled AS BIGINT) = 1 THEN CAST(step_duration_sec AS DOUBLE) END)
                / nullif(median(CASE WHEN CAST(is_shadow AS BIGINT) = 1 THEN CAST(step_duration_sec AS DOUBLE) END), 0) - 1) * 100, 2)
            AS sampled_overhead_pct,
          sum(CASE WHEN CAST(is_shadow AS BIGINT) = 0 AND CAST(sampled AS BIGINT) = 0 THEN 1 ELSE 0 END) AS dispatch_n,
          sum(CASE WHEN CAST(is_shadow AS BIGINT) = 0 THEN 1 ELSE 0 END) AS probed_n,
          sum(CASE WHEN CAST(is_shadow AS BIGINT) = 1 THEN 1 ELSE 0 END) AS shadow_n,
          max(CAST(shadow_baseline AS BIGINT)) AS shadow_baseline
        FROM python.torch_step_timing, bounds
        WHERE CAST(local_step AS BIGINT) >= bounds.win_start AND CAST(local_step AS BIGINT) > 1
      on_empty: skip
      empty_message: "python.torch_step_timing 无数据 — 设置 probing.torch.profiling=on 并等待 shadow 周期"

    - id: cluster_nodes
      title: "集群节点"
      type: sql
      sql: |
        SELECT rank, host, addr, status
        FROM cluster.nodes
        ORDER BY rank
      on_empty: skip
      empty_message: "单进程模式或未注册 cluster 节点"

    - id: nccl_data_integrity
      title: "NCCL profiler 数据完整性"
      type: sql
      sql: |
        SELECT
          ts,
          rank,
          pool_exhausted,
          write_errors,
          ring_rows_overwritten,
          coll_live,
          coll_cap,
          proxy_live,
          proxy_cap
        FROM nccl.profiler_counters
        ORDER BY ts DESC
        LIMIT 1
      on_empty: skip
      empty_message: "nccl.profiler_counters 无数据 — NCCL profiler 未启用"

  interpretation:
    rules:
      - id: no_tables
        when: "step:available_tables | rows == 0"
        severity: error
        message: "没有可查询表 — probing 可能未正确注入"

      - id: nccl_pool_exhausted
        when: "step:nccl_data_integrity | column:pool_exhausted | value > 0"
        severity: error
        message: "NCCL slot pool 曾耗尽 — 通信指标可能不完整"

      - id: nccl_write_errors
        when: "step:nccl_data_integrity | column:write_errors | value > 0"
        severity: error
        message: "NCCL memtable 写入失败 — 部分事件可能丢失"

      - id: nccl_ring_overwrite
        when: "step:nccl_data_integrity | column:ring_rows_overwritten | value > 0"
        severity: warning
        message: "NCCL mmap ring 曾覆写旧行 — 历史窗口可能不完整"

      - id: high_gpu_mem
        when: "step:gpu_mem | column:mem_used_pct | max > 90"
        severity: warning
        message: "GPU 显存使用率超过 90%，关注 OOM 风险"

      - id: training_active
        when: "step:latest_torch_step | column:latest_step | value > 0"
        severity: info
        message: "Torch 训练 trace 活跃，最新 step = {latest_step}"

      - id: torch_shadow_disabled
        when: "step:torch_probe_overhead | column:shadow_baseline | value == 0"
        severity: info
        message: "TorchProbe shadow 基线已关闭 (shadow=off) — 无法估算运行时开销"

      - id: torch_overhead_high
        when: "step:torch_probe_overhead | column:dispatch_overhead_pct | value > 5"
        severity: warning
        message: "TorchProbe dispatch 开销约 {dispatch_overhead_pct}%（非采样 probed vs shadow 中位数，最近 80 步）"

      - id: torch_overhead_blended_high
        when: "step:torch_probe_overhead | column:hook_tax_pct | value > 5"
        severity: info
        message: "混合 hook 开销 {hook_tax_pct}%（含采样步，可能高于 dispatch {dispatch_overhead_pct}%）"

      - id: torch_overhead_low_samples
        when: "step:torch_probe_overhead | column:shadow_n | value < 5"
        severity: info
        message: "Shadow 基线样本不足 — 开销估算仅供参考 (shadow_n={shadow_n}, dispatch_n={dispatch_n})"

  summary_template: |
    ## 健康概览
    - 可用表: {available_tables.row_count} 张
    - 最新训练 step: {latest_torch_step.latest_step}
    - TorchProbe dispatch 开销: {torch_probe_overhead.dispatch_overhead_pct}% (shadow_n={torch_probe_overhead.shadow_n}, dispatch_n={torch_probe_overhead.dispatch_n})
    - 集群节点: {cluster_nodes.row_count} 个（0 表示单机）
    - NCCL 完整性: 见 nccl_data_integrity（pool_exhausted / ring 覆写）

    若某项为空，按 empty_message 提示开启对应采集。
    cluster 查询若标记 PARTIAL/DEGRADED，不得当作完整诊断依据。

  next_steps:
    - "多机训练 job 级诊断 → skill: job_health --global"
    - "训练变慢 → skill: module_bottleneck 或 slow_rank"
    - "显存上涨 → skill: memory_leak"
    - "进程卡住 → skill: training_hang"
