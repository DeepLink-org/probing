# Intent routing — maps user language to skill ids (keyword + LLM fallback).
apiVersion: probing.dev/v1
kind: IntentCatalog

intents:
  health_check:
    label: "健康检查 / 不知道从哪查"
    keywords: [健康, 概览, overview, status, 怎么样, doctor, 体检, checkup, job health, 作业健康, SRE, 值班]
